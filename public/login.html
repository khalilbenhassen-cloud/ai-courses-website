<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Courses</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header>
        <h1>AI Courses</h1>
        <nav>
            <a href="/">← Home</a>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-box">
                <h2>Welcome to AI Courses</h2>
                <p>Sign in to access your courses and track your progress</p>

                <div class="auth-tabs">
                    <button type="button" class="tab-btn active" id="login-tab">Login</button>
                    <button type="button" class="tab-btn" id="register-tab">Register</button>
                </div>

                <form id="auth-form" method="POST">
                    <div class="auth-mode" id="login-mode">
                        <h3>Sign In</h3>
                        <div class="form-group">
                            <input type="email" id="login-email" placeholder="Email address">
                        </div>
                        <div class="form-group">
                            <input type="password" id="login-password" placeholder="Password">
                        </div>
                        <button type="submit" class="btn-primary">Sign In</button>
                        <p class="forgot-link">Forgot password?</p>
                    </div>

                    <div class="auth-mode" id="register-mode" style="display: none;">
                        <h3>Create Account</h3>
                        <div class="form-group">
                            <input type="text" id="register-name" placeholder="Full name">
                        </div>
                        <div class="form-group">
                            <input type="email" id="register-email" placeholder="Email address">
                        </div>
                        <div class="form-group">
                            <input type="password" id="register-password" placeholder="Password">
                        </div>
                        <div class="form-group">
                            <input type="password" id="register-confirm-password" placeholder="Confirm password">
                        </div>
                        <button type="submit" class="btn-primary">Create Account</button>
                        <p class="already-have">Already have an account? <a href="#" id="switch-to-login">Sign in</a></p>
                    </div>

                    <div class="divider">
                        <span>OR</span>
                    </div>

                    <button type="button" id="google-signin" class="btn-google">
                        <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" class="google-logo">
                        Sign in with Google
                    </button>

                    <div id="auth-message" class="auth-message"></div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 AI Courses Website</p>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- Firebase Config -->
    <script src="/firebase-config.js"></script>

    <!-- Auth Script -->
    <script src="/js/auth.js"></script>
</body>
</html>
