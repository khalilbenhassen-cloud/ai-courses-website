<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Detail - AI Courses</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header>
        <h1>AI Courses</h1>
        <nav>
            <a href="/">← Home</a>
            <div id="user-info">
                <span id="user-name"></span>
                <img id="user-pic" src="" alt="User photo" class="user-pic">
                <div id="auth-buttons">
                    <a href="/login" class="btn-login">Login</a>
                </div>
                <div id="login-logout"></div>
            </div>
        </nav>
    </header>

    <main>
        <div id="course-detail" class="course-detail">
            <!-- Course details will be dynamically inserted here -->
        </div>
    </main>

    <footer>
        <p>&copy; 2026 AI Courses Website</p>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Firebase Config -->
    <script src="/firebase-config.js"></script>

    <!-- Auth Script -->
    <script src="/js/auth.js"></script>

    <!-- Course Script -->
    <script src="/js/course.js"></script>
</body>
</html>
